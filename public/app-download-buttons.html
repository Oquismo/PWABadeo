<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descargar App</title>
  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .download-buttons {
      display: flex;
      gap: 24px;
      margin-top: 40px;
    }
    .store-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 16px 28px;
      text-decoration: none;
      color: #222;
      font-size: 1.1rem;
      font-weight: 500;
      transition: box-shadow 0.2s;
      border: none;
      outline: none;
    }
    .store-btn:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .store-icon {
      width: 32px;
      height: 32px;
    }
  </style>
</head>
<body>
  <h2>Descarga la app</h2>
  <div class="download-buttons">
    <a class="store-btn" href="https://apps.apple.com/app/idXXXXXXXX" target="_blank">
      <img class="store-icon" src="https://upload.wikimedia.org/wikipedia/commons/6/67/App_Store_%28iOS%29.svg" alt="App Store">
      Descargar en iPhone
    </a>
    <a class="store-btn" href="https://play.google.com/store/apps/details?id=XXXXXXXX" target="_blank">
  <img class="store-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Android_logo_2019.png" alt="Android">
  Descargar en Android
    </a>
  </div>
</body>
</html>
